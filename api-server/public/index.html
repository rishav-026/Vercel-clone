<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Vercel Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Vercel Clone</p>
      <h1>Deploy Any Repo In One Click</h1>
      <p class="sub">Queue a build, stream live logs, and open your deployed URL.</p>
    </header>

    <section class="panel">
      <form id="deployForm" class="deploy-form">
        <label for="repoUrl">GitHub Repository URL</label>
        <div class="row">
          <input id="repoUrl" name="repoUrl" type="url" placeholder="https://github.com/username/repo" required />
          <button id="deployBtn" type="submit">Deploy</button>
        </div>
      </form>

      <div class="meta-grid">
        <article class="card">
          <p class="label">Project Slug</p>
          <p id="projectSlug" class="value">-</p>
        </article>
        <article class="card">
          <p class="label">Status</p>
          <p id="projectStatus" class="value">Idle</p>
        </article>
        <article class="card card-wide">
          <p class="label">Deployed URL</p>
          <a id="deployUrl" class="value link" href="#" target="_blank" rel="noreferrer">-</a>
        </article>
      </div>

      <section class="logs-wrap">
        <div class="logs-head">
          <h2>Live Logs</h2>
          <button id="clearLogsBtn" type="button" class="ghost">Clear</button>
        </div>
        <pre id="logs" class="logs">Waiting for deployment...</pre>
      </section>
    </section>
  </main>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="/app.js"></script>
</body>
</html>
